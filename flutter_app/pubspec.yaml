name: internet_radio_player
description: A production-ready Internet Radio Player mobile app
publish_to: 'none'
version: 1.1.0+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Audio handling
  just_audio: ^0.9.46
  audio_session: ^0.1.25
  audio_service: ^0.18.15
  
  # HTTP requests
  http: ^1.1.0
  
  # State management
  provider: ^6.1.1
  
  # UI components
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  
  # Utilities
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.1.5
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo-512.png"
  adaptive_icon_background: "#6A229C"  # Your brand purple
  adaptive_icon_foreground: "assets/logo-512.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/logo-512.png
    - assets/images/
